<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OIF PDF Viewer</title>
  <script src="pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #4a4a4a;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 270px;
      min-width: 270px;
      background: #fff;
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 10px 12px 6px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    #sidebar-header h2 {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    #status {
      font-size: 10px;
      color: #666;
    }

    #results {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    #results h4 {
      font-size: 11px;
      font-weight: 700;
      margin: 10px 0 4px;
      color: #333;
    }

    #results p {
      font-size: 10px;
      color: #555;
      margin: 2px 0;
      line-height: 1.4;
    }

    #results ul {
      margin-left: 14px;
    }

    #results li {
      font-size: 10px;
      color: #555;
      margin: 2px 0;
    }

    #results a {
      display: block;
      font-size: 10px;
      color: #1a0dab;
      text-decoration: underline;
      cursor: pointer;
      margin: 2px 0;
      word-break: break-all;
    }

    #results a:hover { color: #c00; }

    #sidebar-footer {
      padding: 8px 12px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    .btn {
      padding: 5px 8px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid #aaa;
      border-radius: 4px;
      background: #f5f5f5;
      width: 100%;
      text-align: center;
    }

    .btn:hover { background: #e8e8e8; }

    /* ── PDF area ── */
    #pdf-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .pdf-page {
      position: relative;
      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
      background: white;
    }

    .pdf-page canvas {
      display: block;
    }

    /* Text layer: transparent spans overlaid on the canvas */
    .textLayer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      line-height: 1;
      pointer-events: none;
    }

    .textLayer span {
      color: transparent;
      position: absolute;
      white-space: pre;
      transform-origin: 0% 0%;
      cursor: text;
    }

    /* Highlight colours */
    .hl-phrase {
      background-color: rgba(255, 220, 0, 0.45);
      border-radius: 2px;
    }

    .hl-url {
      background-color: rgba(80, 180, 255, 0.45);
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-header">
      <h2>OIF Results</h2>
      <div id="status">Loading PDF…</div>
    </div>
    <div id="results"></div>
    <div id="sidebar-footer">
      <button class="btn" id="download-btn">Download All URLs (CSV)</button>
      <button class="btn" id="clear-btn">Clear Stored Links</button>
    </div>
  </div>

  <div id="pdf-area"></div>

  <script src="viewer.js"></script>
</body>
</html>
